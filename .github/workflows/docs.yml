name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # mkdocs gh-deploy pushes the built site to the gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install mkdocs-material

      # regenerate the API index from the current source (pure AST, no deps)
      - run: python tools/gen_api_index.py

      # build the site and push it to the gh-pages branch
      - run: mkdocs gh-deploy --force
