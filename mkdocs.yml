site_name: one
site_description: >-
  A self-contained robotics library -- kinematics, scene, mesh geometry,
  collision, grasp planning, motion, viewer.
site_url: https://wanweiwei07.github.io/one/
repo_url: https://github.com/wanweiwei07/one
repo_name: wanweiwei07/one
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - Home: index.md
  - API Index: API_INDEX.md
